services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: guide-genie-postgres
    environment:
      POSTGRES_DB: guidegenie
      POSTGRES_USER: guidegenie
      POSTGRES_PASSWORD: guidegenie
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U guidegenie"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: guide-genie-redis
    ports:
      - "6379:6379"
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
  redisdata:
